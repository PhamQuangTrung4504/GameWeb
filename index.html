<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      href="./game/assets/logo/logo_favicon1.png"
    />
    <title>Army Vs Zombies</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          linear-gradient(
            180deg,
            rgba(8, 12, 22, 0.84) 0%,
            rgba(10, 16, 27, 0.68) 52%,
            rgba(7, 10, 18, 0.86) 100%
          ),
          url("./game/assets/dashboard/background.jpg") center center / cover
            no-repeat;
      }

      .loading-panel {
        width: min(78vw, 620px);
        transform: translateY(-5vh);
        display: grid;
        justify-items: center;
        row-gap: clamp(20px, 3.8vh, 36px);
      }

      .loading-logo {
        width: clamp(220px, 42vw, 560px);
        height: auto;
        image-rendering: pixelated;
      }

      .loading-spinner {
        width: clamp(78px, 11vw, 128px);
        height: auto;
        image-rendering: pixelated;
        animation: loading-spin 3.6s linear infinite;
        transform-origin: 50% 50%;
      }

      .loading-text {
        width: clamp(132px, 21vw, 260px);
        height: auto;
        image-rendering: pixelated;
      }

      @keyframes loading-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      // Keep query/hash when forwarding to the game entry page.
      const target = "./game/" + window.location.search + window.location.hash;
      window.addEventListener("DOMContentLoaded", () => {
        window.setTimeout(() => window.location.replace(target), 80);
      });
    </script>
  </head>
  <body>
    <div class="loading-panel" aria-live="polite" aria-label="Loading site">
      <img
        class="loading-logo"
        src="./game/assets/logo/logogame1.png"
        alt="Army Vs Zombies"
      />
      <img
        class="loading-spinner"
        src="./game/assets/object/loading.png"
        alt="Loading"
      />
      <img
        class="loading-text"
        src="./game/assets/object/text_loading.png"
        alt="Loading Text"
      />
      <noscript>
        <p style="color: #f9edd8; font-family: Verdana, sans-serif">
          Redirecting to game... <a href="./game/">Click here</a>.
        </p>
      </noscript>
    </div>
  </body>
</html>
