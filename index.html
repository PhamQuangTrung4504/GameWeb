<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to Game...</title>
    <meta http-equiv="refresh" content="0; url=./game/" />
    <script>
      // Keep query/hash when forwarding to the game entry page.
      const target = "./game/" + window.location.search + window.location.hash;
      window.location.replace(target);
    </script>
  </head>
  <body>
    <p>
      Redirecting to game... <a href="./game/">Click here</a> if not redirected.
    </p>
  </body>
</html>
