<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <script>
      (() => {
        const path = window.location.pathname;
        const tail = path.split("/").pop() || "";
        if (!path.endsWith("/") && !tail.includes(".")) {
          const target =
            path + "/" + window.location.search + window.location.hash;
          window.location.replace(target);
        }
      })();
    </script>
    <script>
      (() => {
        const mobileUA =
          /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i;
        const isMobileBrowser = mobileUA.test(navigator.userAgent || "");

        const updateViewportVars = () => {
          const viewportWidth =
            window.visualViewport?.width ?? window.innerWidth;
          const viewportHeight =
            window.visualViewport?.height ?? window.innerHeight;

          document.documentElement.style.setProperty(
            "--mobile-viewport-width",
            `${viewportWidth}px`,
          );
          document.documentElement.style.setProperty(
            "--mobile-viewport-height",
            `${viewportHeight}px`,
          );
        };

        const applyMobileLayout = () => {
          if (!document.body) {
            return;
          }

          updateViewportVars();

          document.body.classList.toggle("is-mobile-browser", isMobileBrowser);

          if (!isMobileBrowser) {
            document.body.classList.remove("mobile-force-landscape");
            return;
          }

          const viewportWidth =
            window.visualViewport?.width ?? window.innerWidth;
          const viewportHeight =
            window.visualViewport?.height ?? window.innerHeight;
          const isPortrait = viewportHeight > viewportWidth;
          document.body.classList.toggle("mobile-force-landscape", isPortrait);
        };

        window.addEventListener("DOMContentLoaded", () => {
          applyMobileLayout();
        });

        window.addEventListener("resize", applyMobileLayout, { passive: true });
        window.addEventListener("orientationchange", applyMobileLayout, {
          passive: true,
        });

        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", applyMobileLayout, {
            passive: true,
          });
        }
      })();
    </script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="preload"
      as="image"
      href="./assets/logo/logogame1.png"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="./assets/object/loading.png"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="./assets/object/text_loading.png"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="./assets/dashboard/background.jpg"
      fetchpriority="high"
    />
    <link rel="icon" type="image/png" href="./assets/logo/logo_favicon1.png" />
    <link rel="apple-touch-icon" href="./assets/logo/logo_favicon1.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Army Vs Zombies</title>
    <style>
      :root {
        color-scheme: light;
        --mobile-viewport-width: 100vw;
        --mobile-viewport-height: 100dvh;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        width: 100vw;
        background-color: #6fafe6;
        background: url("assets/dashboard/background.jpg") center center / cover
          no-repeat;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        overflow: hidden;
      }

      body.is-mobile-browser {
        overscroll-behavior: none;
        touch-action: manipulation;
      }

      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 3000;
        display: grid;
        place-items: center;
        background-color: #5d8fbc;
        background:
          linear-gradient(
            180deg,
            rgba(8, 12, 22, 0.8) 0%,
            rgba(10, 16, 27, 0.66) 52%,
            rgba(7, 10, 18, 0.84) 100%
          ),
          url("assets/dashboard/background.jpg") center center / cover no-repeat;
        opacity: 1;
        visibility: visible;
        transition:
          opacity 0.42s ease,
          visibility 0.42s ease;
      }

      body.is-mobile-browser.mobile-force-landscape #loading-screen,
      body.is-mobile-browser.mobile-force-landscape #game-root {
        position: fixed;
        inset: auto;
        top: 50%;
        left: 50%;
        width: var(--mobile-viewport-height);
        height: var(--mobile-viewport-width);
        max-width: none;
        max-height: none;
        transform: translate(-50%, -50%) rotate(90deg);
        transform-origin: center center;
      }

      #loading-screen.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loading-panel {
        width: min(78vw, 620px);
        transform: translateY(-5vh);
        display: grid;
        justify-items: center;
        row-gap: clamp(20px, 3.8vh, 36px);
      }

      .loading-logo {
        width: clamp(220px, 42vw, 560px);
        height: auto;
        image-rendering: pixelated;
        filter: drop-shadow(0 9px 20px rgba(0, 0, 0, 0.38));
      }

      .loading-spinner {
        width: clamp(78px, 11vw, 128px);
        height: auto;
        image-rendering: pixelated;
        animation: loading-spin 3.6s linear infinite;
        transform-origin: 50% 50%;
        will-change: transform;
        filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.4));
      }

      .loading-text {
        width: clamp(132px, 21vw, 260px);
        height: auto;
        image-rendering: pixelated;
        filter: drop-shadow(0 5px 14px rgba(0, 0, 0, 0.42));
      }

      .loading-error {
        margin: 6px 0 0;
        max-width: min(86vw, 640px);
        color: #ffe9bf;
        font-family: Verdana, "Trebuchet MS", sans-serif;
        font-size: clamp(13px, 1.5vw, 16px);
        font-weight: 700;
        text-align: center;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.42);
      }

      @keyframes loading-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      #game-root {
        border: 0;
        border-radius: 0;
        box-shadow: none;
        overflow: hidden;
        width: 100vw;
        height: 100dvh;
        max-height: 100dvh;
        max-width: 100vw;
        background-color: #6fafe6;
        background: url("assets/dashboard/background.jpg") center center / cover
          no-repeat;
      }

      #game-root canvas {
        display: block;
        margin: 0 auto;
        width: 100% !important;
        height: 100% !important;
      }

      #game-root:fullscreen,
      #game-root:-webkit-full-screen {
        width: 100vw;
        height: 100dvh;
        max-height: 100dvh;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        display: grid;
        place-items: center;
        background: #16120e;
      }

      #game-root:fullscreen canvas,
      #game-root:-webkit-full-screen canvas {
        margin: auto;
      }

      @media (min-width: 1440px) {
        #game-root {
          width: 100vw;
        }
      }

      @media (max-width: 1024px) {
        #game-root {
          width: 100vw;
          height: 100dvh;
          border-width: 0;
          border-radius: 0;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="loading-screen" aria-live="polite" aria-label="Loading game">
      <div class="loading-panel">
        <img
          class="loading-logo"
          src="./assets/logo/logogame1.png"
          fetchpriority="high"
          alt="Army Vs Zombies"
        />
        <img
          class="loading-spinner"
          src="./assets/object/loading.png"
          fetchpriority="high"
          alt="Loading"
        />
        <img
          class="loading-text"
          src="./assets/object/text_loading.png"
          fetchpriority="high"
          alt="Loading Text"
        />
      </div>
    </div>

    <div id="game-root"></div>

    <script>
      (() => {
        const loadingScreen = document.getElementById("loading-screen");
        const minVisibleMs = 480;
        let visibleSince = performance.now();
        let hideTimerId = null;

        window.showGameLoading = () => {
          if (!loadingScreen) {
            return;
          }

          if (hideTimerId) {
            window.clearTimeout(hideTimerId);
            hideTimerId = null;
          }

          loadingScreen.classList.remove("is-hidden");
          visibleSince = performance.now();
        };

        window.hideGameLoading = (force = false) => {
          if (!loadingScreen) {
            return;
          }

          if (hideTimerId) {
            window.clearTimeout(hideTimerId);
            hideTimerId = null;
          }

          const elapsed = performance.now() - visibleSince;
          const delay = force ? 0 : Math.max(0, minVisibleMs - elapsed);

          hideTimerId = window.setTimeout(() => {
            loadingScreen.classList.add("is-hidden");
            hideTimerId = null;
          }, delay);
        };

        window.showGameLoading();
      })();
    </script>

    <script type="module">
      const loadingPanel = document.querySelector(".loading-panel");

      const showLoadingError = (message) => {
        if (!loadingPanel) {
          return;
        }

        const oldNode = loadingPanel.querySelector(".loading-error");
        if (oldNode) {
          oldNode.remove();
        }

        const node = document.createElement("p");
        node.className = "loading-error";
        node.textContent = message;
        loadingPanel.appendChild(node);
      };

      const loadScript = (src) =>
        new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.async = true;
          script.onload = () => resolve(src);
          script.onerror = () => reject(new Error(`Failed to load ${src}`));
          document.head.appendChild(script);
        });

      const phaserCdnCandidates = [
        "https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js",
        "https://unpkg.com/phaser@3.90.0/dist/phaser.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/phaser/3.90.0/phaser.min.js",
      ];

      let phaserLoaded = false;
      for (const cdn of phaserCdnCandidates) {
        try {
          await loadScript(cdn);
          phaserLoaded = typeof window.Phaser !== "undefined";
          if (phaserLoaded) {
            break;
          }
        } catch {
          // Try the next CDN source.
        }
      }

      if (!phaserLoaded) {
        showLoadingError(
          "Khong the tai thu vien game. Vui long kiem tra mang va thu lai.",
        );
      } else {
        try {
          await import("./main.js");
        } catch (error) {
          console.error("Failed to bootstrap game:", error);
          showLoadingError("Co loi khi khoi tao game. Vui long tai lai trang.");
        }
      }
    </script>
  </body>
</html>
