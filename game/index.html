<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./assets/logo/logo_favicon1.png" />
    <link rel="apple-touch-icon" href="./assets/logo/logo_favicon1.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Army Vs Zombies</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        width: 100vw;
        background: url("assets/dashboard/background.jpg") center center / cover
          no-repeat;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        overflow: hidden;
      }

      #game-root {
        border: 0;
        border-radius: 0;
        box-shadow: none;
        overflow: hidden;
        width: 100vw;
        height: 100dvh;
        max-height: 100dvh;
        max-width: 100vw;
        background: url("assets/dashboard/background.jpg") center center / cover
          no-repeat;
      }

      #game-root canvas {
        display: block;
        margin: 0 auto;
        width: 100% !important;
        height: 100% !important;
      }

      #game-root:fullscreen,
      #game-root:-webkit-full-screen {
        width: 100vw;
        height: 100dvh;
        max-height: 100dvh;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        display: grid;
        place-items: center;
        background: #16120e;
      }

      #game-root:fullscreen canvas,
      #game-root:-webkit-full-screen canvas {
        margin: auto;
      }

      @media (min-width: 1440px) {
        #game-root {
          width: 100vw;
        }
      }

      @media (max-width: 1024px) {
        #game-root {
          width: 100vw;
          height: 100dvh;
          border-width: 0;
          border-radius: 0;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
